# ── docker-compose.yml — RouteZone ───────────────────────────────
# Lance les 2 APIs en une seule commande : docker-compose up
#
# Les fichiers lourds (BDD, modèles) sont montés en volumes depuis
# l'hôte — ils ne sont pas copiés dans les images Docker.

services:

  # ── API données ─────────────────────────────────────────────────
  api_data:
    build:
      context: .
      dockerfile: docker/Dockerfile.api_data
    container_name: routezone_api_data
    ports:
      - "8000:8000"
    volumes:
      - ./bdd:/app/bdd:ro
    environment:
      - API_KEY=routezone-secret-2024
    restart: unless-stopped

  # ── API IA ──────────────────────────────────────────────────────
  api_ia:
    build:
      context: .
      dockerfile: docker/Dockerfile.api_ia
    container_name: routezone_api_ia
    ports:
      - "8001:8001"
    volumes:
      - ./models:/app/models:ro
    environment:
      - API_KEY=routezone-secret-2024
      - MODELS_DIR=/app/models
    restart: unless-stopped
